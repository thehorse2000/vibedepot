<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Processor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      padding: 24px;
      min-height: 100vh;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #64748b; font-size: 0.875rem; margin-bottom: 24px; }

    .drop-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      margin-bottom: 20px;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #6366f1;
      background: #eef2ff;
    }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .drop-zone .label { color: #64748b; font-size: 0.875rem; }
    .drop-zone .filename { color: #1e293b; font-weight: 600; margin-top: 8px; }

    .prompt-section { margin-bottom: 20px; }
    .prompt-section label { display: block; font-weight: 600; font-size: 0.875rem; margin-bottom: 6px; }
    .prompt-section select, .prompt-section textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.875rem;
      font-family: inherit;
      background: white;
    }
    .prompt-section textarea { height: 80px; resize: vertical; }

    .btn {
      background: #6366f1;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .result {
      margin-top: 24px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
    }
    .result h3 { font-size: 0.875rem; font-weight: 600; margin-bottom: 8px; color: #6366f1; }
    .result pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 0.8125rem;
      line-height: 1.6;
      color: #334155;
    }
    .loading { color: #6366f1; font-style: italic; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <h1>File Processor</h1>
  <p class="subtitle">Drop a text file to process it with AI</p>

  <div class="drop-zone" id="dropZone">
    <div class="icon">📄</div>
    <div class="label">Drag & drop a file here, or click to browse</div>
    <div class="filename" id="fileName"></div>
    <input type="file" id="fileInput" style="display:none" accept=".txt,.md,.csv,.json,.html,.xml,.log">
  </div>

  <div class="prompt-section">
    <label>Processing Mode</label>
    <select id="mode">
      <option value="summarize">Summarize</option>
      <option value="extract">Extract Key Points</option>
      <option value="transform">Transform / Rewrite</option>
      <option value="custom">Custom Prompt</option>
    </select>
  </div>

  <div class="prompt-section" id="customPromptSection" style="display:none">
    <label>Custom Prompt</label>
    <textarea id="customPrompt" placeholder="Describe what you want to do with the file content..."></textarea>
  </div>

  <button class="btn" id="processBtn" disabled>Process File</button>

  <div class="result" id="result" style="display:none">
    <h3>Result</h3>
    <pre id="resultText"></pre>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const modeSelect = document.getElementById('mode');
    const customPromptSection = document.getElementById('customPromptSection');
    const customPrompt = document.getElementById('customPrompt');
    const processBtn = document.getElementById('processBtn');
    const result = document.getElementById('result');
    const resultText = document.getElementById('resultText');

    let fileContent = null;

    // Drag and drop
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        fileContent = e.target.result;
        fileName.textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
        processBtn.disabled = false;
      };
      reader.readAsText(file);
    }

    // Mode toggle
    modeSelect.addEventListener('change', () => {
      customPromptSection.style.display = modeSelect.value === 'custom' ? 'block' : 'none';
    });

    // Process
    processBtn.addEventListener('click', async () => {
      if (!fileContent) return;

      const prompts = {
        summarize: 'Summarize the following content concisely:',
        extract: 'Extract the key points and important information from:',
        transform: 'Rewrite and improve the following content:',
        custom: customPrompt.value || 'Analyze the following content:',
      };

      const mode = modeSelect.value;
      const prompt = prompts[mode];

      processBtn.disabled = true;
      result.style.display = 'block';
      resultText.className = 'loading';
      resultText.textContent = 'Processing...';

      try {
        const response = await window.vibeDepot.ai.callAI({
          messages: [
            { role: 'user', content: prompt + '\n\n' + fileContent }
          ],
          maxTokens: 2048,
        });
        resultText.className = '';
        resultText.textContent = response.content;

        // Save result to KV storage
        await window.vibeDepot.storage.set('lastResult', {
          mode,
          content: response.content,
          timestamp: new Date().toISOString(),
        });
      } catch (err) {
        resultText.className = 'error';
        resultText.textContent = 'Error: ' + err.message;
      } finally {
        processBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
